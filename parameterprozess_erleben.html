<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neuer Parametermanagement-Prozess erleben</title>
    <style>
      :root {
        color-scheme: dark;
        --yellow: #ffc400;
        --bg: #020506;
        --line: rgba(255, 255, 255, 0.18);
        --text: #f7f7f2;
        --muted: rgba(247, 247, 242, 0.72);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
        font-family: Arial, Helvetica, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 50% 18%, rgba(255, 196, 0, 0.12), transparent 34%),
          linear-gradient(135deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          var(--bg);
        background-size: auto, 96px 96px, auto;
      }

      header {
        min-height: 82px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        padding: 22px clamp(20px, 4vw, 56px);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0;
      }

      .back-link:hover,
      .back-link:focus-visible {
        color: var(--yellow);
      }

      h1 {
        margin: 0;
        font-size: clamp(18px, 2.4vw, 30px);
        text-align: right;
        text-transform: uppercase;
      }

      main {
        min-height: 0;
        display: grid;
        place-items: center;
        padding: 0 clamp(16px, 4vw, 56px) clamp(20px, 4vw, 56px);
      }

      .video-shell {
        width: min(1500px, 100%);
        aspect-ratio: 16 / 9;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: #000;
        box-shadow: 0 34px 90px rgba(0, 0, 0, 0.52), 0 0 80px rgba(255, 196, 0, 0.12);
      }

      video {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
        background: #000;
      }

      @media (max-width: 720px) {
        header {
          align-items: flex-start;
          flex-direction: column;
        }

        h1 {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <a class="back-link" href="index.html#process">Zurück zur Präsentation</a>
      <h1>Neuer Parametermanagement-Prozess</h1>
    </header>
    <main>
      <div class="video-shell">
        <video src="assets/videos/parameterprozess_video_final_poliert_v4.mp4" controls autoplay playsinline preload="auto"></video>
      </div>
    </main>
  </body>
</html>
